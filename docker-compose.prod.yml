version: '3.8'

services:
  db:
    image: postgres:15.2-alpine
    restart: always
    volumes:
      - ./prod-data/db:/var/lib/postgresql/data
    env_file:
      - ./config/prod/postgres.env

  pgbackups:
    image: prodrigestivill/postgres-backup-local
    restart: always
    user: postgres:postgres
    volumes:
      - ./prod-data/backups/db:/backups
    env_file:
      - ./config/prod/postgres-backup.env
    depends_on:
      - db

  web:
    restart: always
    user: 1001:1001
    build:
      context: .
      dockerfile: ./config/prod/Dockerfile.prod
    command: gunicorn app.wsgi:application --bind 0.0.0.0:9090
    volumes:
      - ./prod-data/staticfiles:/opt/app/staticfiles
      - ./prod-data/mediafiles:/opt/app/mediafiles
      - ./app:/opt/app/src
    ports:
      - 9090:9090
    env_file:
      - ./config/prod/prod.env
    depends_on:
      - db
