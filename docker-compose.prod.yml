version: '3.8'

services:
  db:
    image: postgres:15.3-alpine
    restart: always
    volumes:
      - ./data/production/db:/var/lib/postgresql/data
    env_file:
      - ./config/production/postgres.env

  pgbackups:
    image: prodrigestivill/postgres-backup-local
    restart: always
    user: postgres:postgres
    volumes:
      - ./data/production/backups/db:/backups
    env_file:
      - ./config/production/postgres-backup.env
    depends_on:
      - db

  web:
    restart: always
    user: 1001:1001
    build:
      context: .
      dockerfile: ./config/production/Dockerfile.prod.web
    command: gunicorn app.wsgi:application --bind 0.0.0.0:9090
    volumes:
      - ./data/production/staticfiles:/opt/app/staticfiles
      - ./data/production/mediafiles:/opt/app/mediafiles
      - ./app:/opt/app/src
    ports:
      - 9090:9090
    env_file:
      - ./config/production/production.env
    depends_on:
      - db
